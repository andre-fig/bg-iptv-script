name: Update playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate playlist
        run: npm run update
        env:
          ELEMENTAL_EMAIL: ${{ secrets.ELEMENTAL_EMAIL }}
          ELEMENTAL_PASSWORD: ${{ secrets.ELEMENTAL_PASSWORD }}

      - name: Commit playlist changes
        run: |
          if git diff --quiet -- playlist.m3u8; then
            echo "playlist.m3u8 is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u8
          git commit -m "chore: update playlist token"
          git push
