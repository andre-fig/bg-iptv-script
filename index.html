<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BG IPTV</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f14;
        --panel: #121923;
        --panel-2: #182232;
        --text: #edf3fa;
        --muted: #9cacbd;
        --line: #263345;
        --accent: #4ea1ff;
        --danger: #ff6868;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: var(--panel);
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
        overflow: hidden;
      }

      .header {
        padding: 20px;
        border-bottom: 1px solid var(--line);
      }

      .header h1 {
        margin: 0 0 6px;
        font-size: 22px;
        line-height: 1.2;
      }

      .header p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .toolbar {
        display: grid;
        gap: 10px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      .search,
      .button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
        min-height: 42px;
      }

      .search {
        padding: 0 12px;
      }

      .button {
        cursor: pointer;
      }

      .button:hover,
      .channel:hover,
      .channel.active {
        border-color: var(--accent);
      }

      .channels {
        flex: 1;
        overflow: auto;
        padding: 10px;
        display: grid;
        gap: 8px;
        min-height: 0;
        align-content: start;
      }

      .channel {
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        padding: 10px;
        text-align: left;
      }

      .channel img {
        width: 48px;
        height: 48px;
        object-fit: contain;
        border-radius: 8px;
        background: #fff;
        padding: 5px;
      }

      .channel-name {
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .channel-group {
        color: var(--muted);
        font-size: 13px;
        margin-top: 3px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .main {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        overflow: hidden;
      }

      .player-wrap {
        background: #000;
        border-bottom: 1px solid var(--line);
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        background: #000;
      }

      .details {
        padding: 22px;
        display: grid;
        gap: 10px;
        overflow: hidden;
      }

      .details h2 {
        margin: 0;
        font-size: 24px;
      }

      .status {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .status.error {
        color: var(--danger);
      }

      .status:empty {
        display: none;
      }

      .empty {
        padding: 18px;
        color: var(--muted);
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: 48dvh minmax(0, 1fr);
        }

        .sidebar {
          height: 100%;
          min-height: 260px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="header">
          <h1>BG IPTV</h1>
          <p id="channel-count">Loading playlist...</p>
        </div>
        <div class="toolbar">
          <input id="search" class="search" type="search" placeholder="Search channels" />
          <button id="reload" class="button" type="button">Reload playlist</button>
        </div>
        <div id="channels" class="channels"></div>
      </aside>

      <main class="main">
        <div class="player-wrap">
          <video id="video" controls playsinline></video>
        </div>
        <section class="details">
          <h2 id="current-title">Select a channel</h2>
          <p id="status" class="status">Choose a channel from the list to start playback.</p>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.7/dist/hls.min.js"></script>
    <script>
      const playlistUrl = "playlist.m3u8";
      const channelsEl = document.querySelector("#channels");
      const countEl = document.querySelector("#channel-count");
      const searchEl = document.querySelector("#search");
      const reloadEl = document.querySelector("#reload");
      const videoEl = document.querySelector("#video");
      const titleEl = document.querySelector("#current-title");
      const statusEl = document.querySelector("#status");

      let channels = [];
      let activeUrl = "";
      let hls;

      loadPlaylist();

      reloadEl.addEventListener("click", loadPlaylist);
      searchEl.addEventListener("input", renderChannels);

      async function loadPlaylist() {
        setStatus("Loading playlist...");

        try {
          const response = await fetch(`${playlistUrl}?t=${Date.now()}`, { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`Playlist request failed with HTTP ${response.status}.`);
          }

          const text = await response.text();
          channels = parseM3u(text);
          countEl.textContent = `${channels.length} channels`;
          renderChannels();
          setStatus("Playlist loaded. Select a channel to start playback.");
        } catch (error) {
          channels = [];
          countEl.textContent = "Playlist unavailable";
          renderChannels();
          setStatus(error.message, true);
        }
      }

      function parseM3u(text) {
        const lines = text
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);
        const parsed = [];

        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index];

          if (!line.startsWith("#EXTINF")) {
            continue;
          }

          const next = lines[index + 1];

          if (!next || next.startsWith("#")) {
            continue;
          }

          const commaIndex = line.lastIndexOf(",");
          const attrs = parseAttributes(line);
          const name = commaIndex >= 0 ? line.slice(commaIndex + 1).trim() : attrs["tvg-name"] || "Channel";

          parsed.push({
            id: attrs["tvg-id"] || name,
            name,
            logo: attrs["tvg-logo"] || "",
            group: attrs["group-title"] || "TV",
            url: next,
          });
        }

        return parsed;
      }

      function parseAttributes(line) {
        const attrs = {};
        const pattern = /([a-zA-Z0-9_-]+)="([^"]*)"/g;
        let match;

        while ((match = pattern.exec(line))) {
          attrs[match[1]] = match[2];
        }

        return attrs;
      }

      function renderChannels() {
        const query = searchEl.value.trim().toLowerCase();
        const filtered = channels.filter((channel) =>
          `${channel.name} ${channel.group}`.toLowerCase().includes(query),
        );

        channelsEl.innerHTML = "";

        if (!filtered.length) {
          channelsEl.innerHTML = '<div class="empty">No channels found.</div>';
          return;
        }

        for (const channel of filtered) {
          const button = document.createElement("button");
          button.className = `channel${channel.url === activeUrl ? " active" : ""}`;
          button.type = "button";
          button.addEventListener("click", () => playChannel(channel));

          const img = document.createElement("img");
          img.alt = "";
          img.loading = "lazy";
          img.src = channel.logo;
          img.onerror = () => {
            img.style.visibility = "hidden";
          };

          const meta = document.createElement("div");
          meta.innerHTML = `
            <div class="channel-name"></div>
            <div class="channel-group"></div>
          `;
          meta.querySelector(".channel-name").textContent = channel.name;
          meta.querySelector(".channel-group").textContent = channel.group;

          button.append(img, meta);
          channelsEl.append(button);
        }
      }

      function playChannel(channel) {
        activeUrl = channel.url;
        titleEl.textContent = channel.name;
        setStatus("");
        renderChannels();

        if (hls) {
          hls.destroy();
          hls = undefined;
        }

        if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
          videoEl.src = channel.url;
          videoEl.play().catch((error) => setStatus(error.message, true));
          return;
        }

        if (!window.Hls || !Hls.isSupported()) {
          setStatus("This browser does not support HLS playback.", true);
          return;
        }

        hls = new Hls({ enableWorker: true, lowLatencyMode: false });
        hls.on(Hls.Events.ERROR, (_event, data) => {
          if (data.fatal) {
            setStatus(
              "Stream loading failed. The browser may be blocked by CORS, the token may be expired, or the account may have reached its session limit.",
              true,
            );
          }
        });
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          videoEl.play().catch((error) => setStatus(error.message, true));
        });
        hls.loadSource(channel.url);
        hls.attachMedia(videoEl);
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }
    </script>
  </body>
</html>
